<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gesture-Controlled 3D Earth</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- API key warning (shown if key is still a placeholder) -->
  <div id="api-warning"></div>

  <!-- Fullscreen 3D map -->
  <div id="map-container">
    <gmp-map-3d id="map3d"></gmp-map-3d>
  </div>

  <!-- Webcam feed (hidden; fed to MediaPipe) -->
  <video id="webcam" autoplay muted playsinline></video>

  <!-- Hand-tracking preview: webcam thumbnail + skeleton overlay -->
  <div id="preview-wrapper">
    <canvas id="preview-canvas"></canvas>
    <div id="preview-label">Hand Tracking</div>
  </div>

  <!-- Gesture status + control hints (top-left) -->
  <div id="ui-panel">
    <div id="gesture-display">
      <span id="gesture-icon">—</span>
      <span id="gesture-label">No gesture</span>
    </div>
    <div id="controls-hint">
      <div class="hint-row">
        <span class="hint-icon">✋</span>
        <span class="hint-action">Open palm</span>
        <span class="hint-desc">Pan</span>
      </div>
      <div class="hint-row">
        <span class="hint-icon">🤏</span>
        <span class="hint-action">Pinch + move up/down</span>
        <span class="hint-desc">Zoom</span>
      </div>
      <div class="hint-row">
        <span class="hint-icon">✊</span>
        <span class="hint-action">Closed fist + rotate</span>
        <span class="hint-desc">Rotate &amp; tilt</span>
      </div>
    </div>
  </div>

  <!-- Status bar (bottom-left) -->
  <div id="status-bar">
    <div id="tracking-dot"></div>
    <span id="status-text">Initializing…</span>
  </div>

  <!-- Error overlay -->
  <div id="error-overlay" class="hidden">
    <div class="error-card">
      <div class="error-icon">⚠</div>
      <h2 id="error-title">Error</h2>
      <p id="error-message"></p>
      <button onclick="location.reload()">Reload Page</button>
    </div>
  </div>

  <!-- Loading overlay -->
  <div id="loading-overlay">
    <div class="loader-ring"></div>
    <p id="loading-text">Starting…</p>
  </div>

  <!--
    ╔══════════════════════════════════════════════════════╗
    ║  SETUP REQUIRED                                      ║
    ║  1. Go to console.cloud.google.com                   ║
    ║  2. Create a project and enable:                     ║
    ║       • Map Tiles API                                ║
    ║       • Maps JavaScript API                          ║
    ║  3. Create an API key                                ║
    ║  4. Replace YOUR_GOOGLE_MAPS_API_KEY below           ║
    ╚══════════════════════════════════════════════════════╝
  -->
  <script async
    src="https://maps.googleapis.com/maps/api/js?key=YOUR_GOOGLE_MAPS_API_KEY&v=beta&libraries=maps3d">
  </script>

  <script type="module" src="app.js"></script>

</body>
</html>
