<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Spherical Particle Attractors</title>
    <style>
        * { margin: 0; padding: 0; }
        body {
            overflow: hidden;
            background: #000;
            touch-action: none;
        }
        canvas { display: block; }
    </style>
</head>
<body>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // ── Scene ──────────────────────────────────────────────────────────────
        const scene    = new THREE.Scene();
        const camera   = new THREE.PerspectiveCamera(45, innerWidth / innerHeight, 0.1, 1000);
        camera.position.z = 36;

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(innerWidth, innerHeight);
        renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        // ── Particles ──────────────────────────────────────────────────────────
        const PARTICLE_COUNT = 200000;
        const BASE_RADIUS    = 15.0;

        const geo = new THREE.BufferGeometry();
        const buf = new Float32Array(PARTICLE_COUNT * 3);

        for (let i = 0; i < PARTICLE_COUNT; i++) {
            const theta = 2 * Math.PI * Math.random();
            const phi   = Math.acos(2 * Math.random() - 1);
            const sp = Math.sin(phi), cp = Math.cos(phi);
            const st = Math.sin(theta), ct = Math.cos(theta);
            buf[i*3]   = BASE_RADIUS * sp * ct;
            buf[i*3+1] = BASE_RADIUS * sp * st;
            buf[i*3+2] = BASE_RADIUS * cp;
        }
        geo.setAttribute('position', new THREE.BufferAttribute(buf, 3));

        // ── Attractors ─────────────────────────────────────────────────────────
        const N          = 8;
        const attractors = Array.from({ length: N }, () => new THREE.Vector3());
        const touchPos   = new THREE.Vector3(99999, 0, 0);   // far off-screen

        // ── Vertex Shader ──────────────────────────────────────────────────────
        // Attractors pull particles INWARD along the surface normal → craters
        const vertexShader = `
            uniform vec3  uAtt[${N}];
            uniform vec3  uTouch;
            uniform float uTouchStr;
            varying float vD;

            void main() {
                vec3  p    = position;
                vec3  norm = normalize(position);
                float disp = 0.0;

                // Auto-animating attractors
                float bR = 7.0;
                float bD = 10.0;
                for (int i = 0; i < ${N}; i++) {
                    float d = distance(p, uAtt[i]);
                    if (d < bR) {
                        float nd = d / bR;
                        float f  = pow(smoothstep(1.0, 0.0, nd), 1.6);
                        disp += f * bD;
                    }
                }

                // Touch / mouse attractor (slightly wider, deeper)
                float tR = 8.5;
                float td = distance(p, uTouch);
                if (td < tR) {
                    float nd = td / tR;
                    float f  = pow(smoothstep(1.0, 0.0, nd), 1.4);
                    disp += f * bD * 1.4 * uTouchStr;
                }

                // Pull INWARD along surface normal → craters
                p   -= norm * disp;
                vD   = disp;

                vec4 mv = modelViewMatrix * vec4(p, 1.0);
                gl_Position  = projectionMatrix * mv;
                gl_PointSize = 14.0 / -mv.z;
            }
        `;

        // ── Fragment Shader ────────────────────────────────────────────────────
        // Displacement encodes position in crater:
        //   low  → white sphere surface
        //   ramp → blue (outer edge) → bright white (rim) → red (inner) → dark (floor)
        const fragmentShader = `
            varying float vD;

            void main() {
                // Circular sprite
                vec2 c = gl_PointCoord - 0.5;
                if (dot(c, c) > 0.25) discard;

                float d = vD;
                vec3  col;
                float alpha;

                if (d < 0.5) {
                    // Undisplaced sphere surface – bright white/silver
                    col   = vec3(0.80, 0.80, 0.86);
                    alpha = 0.50;

                } else if (d < 2.5) {
                    // Outer crater approach – subtle blue fringe
                    float t = smoothstep(0.5, 2.5, d);
                    col   = mix(vec3(0.80, 0.80, 0.86), vec3(0.15, 0.42, 1.0), t * 0.8);
                    alpha = mix(0.50, 0.75, t);

                } else if (d < 4.5) {
                    // Crater rim – peak brightness, pure white
                    float t = smoothstep(2.5, 4.5, d);
                    col   = mix(vec3(0.15, 0.42, 1.0), vec3(1.0, 1.0, 1.0), t);
                    alpha = mix(0.75, 1.0, t);

                } else if (d < 7.5) {
                    // Inner rim – red/chromatic fringe
                    float t = smoothstep(4.5, 7.5, d);
                    col   = mix(vec3(1.0, 1.0, 1.0), vec3(1.0, 0.10, 0.05), t);
                    alpha = mix(1.0, 0.60, t);

                } else {
                    // Deep crater floor – fade to black / transparent
                    float t = smoothstep(7.5, 12.0, d);
                    col   = mix(vec3(1.0, 0.10, 0.05), vec3(0.04, 0.02, 0.04), t);
                    alpha = mix(0.60, 0.0, t);
                }

                gl_FragColor = vec4(col, alpha);
            }
        `;

        const mat = new THREE.ShaderMaterial({
            uniforms: {
                uAtt:      { value: attractors },
                uTouch:    { value: touchPos },
                uTouchStr: { value: 0.0 }
            },
            vertexShader,
            fragmentShader,
            transparent: true,
            depthWrite:  false,
            blending:    THREE.AdditiveBlending
        });

        const pts = new THREE.Points(geo, mat);
        scene.add(pts);

        // ── Resize ─────────────────────────────────────────────────────────────
        window.addEventListener('resize', () => {
            camera.aspect = innerWidth / innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(innerWidth, innerHeight);
        });

        // ── Interaction ────────────────────────────────────────────────────────
        // • Drag  → rotate sphere (with inertia)
        // • Press → create deep crater under pointer (follows rotation live)
        const raycaster = new THREE.Raycaster();
        const hitSphere = new THREE.Sphere(new THREE.Vector3(), BASE_RADIUS);

        let pressing = false;
        let prev     = { x: 0, y: 0 };
        let pressX   = 0, pressY = 0;
        let velX     = 0, velY   = 0;
        let touchStrTarget = 0, touchStrCur = 0;

        function ndcFrom(x, y) {
            return new THREE.Vector2(
                 (x / innerWidth)  * 2 - 1,
                -(y / innerHeight) * 2 + 1
            );
        }

        // Project screen coords onto sphere surface in local (rotating) space
        function updateTouchAttractor(x, y) {
            raycaster.setFromCamera(ndcFrom(x, y), camera);
            const hit = new THREE.Vector3();
            if (raycaster.ray.intersectSphere(hitSphere, hit)) {
                pts.updateMatrixWorld(true);
                pts.worldToLocal(hit);
                touchPos.copy(hit);
            }
        }

        function onDown(x, y) {
            pressing = true;
            prev     = { x, y };
            pressX   = x;
            pressY   = y;
            velX     = velY = 0;
            touchStrTarget = 1.0;
        }

        function onMove(x, y) {
            if (!pressing) return;
            const dx = x - prev.x;
            const dy = y - prev.y;
            velY = dx * 0.006;
            velX = dy * 0.006;
            pts.rotation.y += velY;
            pts.rotation.x += velX;
            pressX = x;
            pressY = y;
            prev   = { x, y };
        }

        function onUp() {
            pressing       = false;
            touchStrTarget = 0;
        }

        // Mouse
        const el = renderer.domElement;
        el.addEventListener('mousedown',  e => onDown(e.clientX, e.clientY));
        el.addEventListener('mousemove',  e => { if (e.buttons & 1) onMove(e.clientX, e.clientY); });
        el.addEventListener('mouseup',    onUp);
        el.addEventListener('mouseleave', onUp);

        // Touch
        el.addEventListener('touchstart', e => {
            e.preventDefault();
            onDown(e.touches[0].clientX, e.touches[0].clientY);
        }, { passive: false });

        el.addEventListener('touchmove', e => {
            e.preventDefault();
            onMove(e.touches[0].clientX, e.touches[0].clientY);
        }, { passive: false });

        el.addEventListener('touchend', e => {
            e.preventDefault();
            onUp();
        }, { passive: false });

        // ── Animation Loop ─────────────────────────────────────────────────────
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const t = clock.getElapsedTime();

            // Move auto-attractors along unique orbital paths on sphere surface
            for (let i = 0; i < N; i++) {
                const spd = 0.45, off = i * 1.618;
                const x = BASE_RADIUS * Math.sin(t*spd + off)     * Math.cos(t*spd*0.70 + off);
                const y = BASE_RADIUS * Math.sin(t*spd*0.8 + off) * Math.sin(t*spd*1.10 + off);
                const z = BASE_RADIUS * Math.cos(t*spd*0.9 + off);
                attractors[i].set(x, y, z).normalize().multiplyScalar(BASE_RADIUS);
            }

            // Gentle auto-rotation
            pts.rotation.y += 0.0020;
            pts.rotation.x += 0.0004;

            // Inertia after drag
            if (!pressing) {
                velX *= 0.95;
                velY *= 0.95;
                pts.rotation.x += velX;
                pts.rotation.y += velY;
            }

            // Update touch attractor AFTER rotation is applied this frame
            if (pressing) {
                updateTouchAttractor(pressX, pressY);
            }

            // Smooth touch strength fade in/out
            touchStrCur += (touchStrTarget - touchStrCur) * 0.08;

            mat.uniforms.uAtt.value      = attractors;
            mat.uniforms.uTouch.value    = touchPos;
            mat.uniforms.uTouchStr.value = touchStrCur;

            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
